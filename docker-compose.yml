version: '3.8'

services:
  fastapi:
    build: .
    container_name: hw_api
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./models:/app/models

  streamlit:
    build: .
    container_name: hw_ui
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./models:/app/models
    depends_on:
      - fastapi
